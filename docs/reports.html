<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>רשימת ביקורות ותרגילים - 8109</title>
  <meta name="theme-color" content="#0b1220"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="assets/style.css"/>
</head>
<body>
<header>
  <div class="bar">
    <div>
    <div class="actions" style="margin:0">
      <a href="index.html" style="text-decoration:none"><button>📋 טופס</button></a>
      <a href="dashboard.html" style="text-decoration:none"><button>דשבורד 🔒</button></a>
      <a href="reports.html" style="text-decoration:none"><button class="active-tab">רשומות 🗂️</button></a>
      <a href="ai.html" style="text-decoration:none"><button>AI 🦉</button></a>
      <button class="primary hidden" id="loginBtn">כניסה</button>
      <button class="danger hidden" id="logoutBtn">צא</button>
    </div>
  </div>
</header>

<div class="container">

  <div class="card">
    <h3>פילטרים</h3>
    <div class="row">
      <div>
        <label>סוג</label>
        <select id="filterType">
          <option value="">הכל</option>
          <option value="ביקורת קצה מבצעי">ביקורת קצה מבצעי</option>
          <option value="תרגול משימה">תרגול משימה</option>
          <option value="תרגיל מסגרתי אורגני">תרגיל מסגרתי אורגני</option>
          <option value="תרגיל משולב כוחות">תרגיל משולב כוחות</option>
          <option value="ביקורת חמ״ל">ביקורת חמ״ל</option>
          <option value="סיכום פעילות התקפית ⚔️">⚔️ סיכום פעילות התקפית</option>
        </select>
      </div>
      <div>
        <label>גזרה</label>
        <select id="filterSector">
          <option value="">הכל</option>
          <option value="אלון מורה">אלון מורה</option>
          <option value="איתמר">איתמר</option>
          <option value="ברכה">ברכה</option>
          <option value="לב השומרון">לב השומרון</option>
          <option value="אחר">אחר</option>
        </select>
      </div>
      <div>
        <label>שילוב תצפיות</label>
        <select id="filterObservations">
          <option value="">הכל</option>
          <option value="40">40</option>
          <option value="50">50</option>
          <option value="20">20</option>
          <option value="40א">40א</option>
          <option value="30">30</option>
          <option value="ללא">ללא</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div>
        <label>חיפוש בשם מבצע</label>
        <input type="text" name="email" style="display:none" tabIndex="-1">
        <input id="filterName" name="xyz_name_fld" placeholder="לדוגמה: אלי" 
          readonly onfocus="this.removeAttribute('readonly');"
          autocomplete="one-time-code"/>
      </div>
      <div>
        <label>חיפוש חופשי (כותרת משימה)</label>
        <input type="text" name="username" style="display:none" tabIndex="-1">
        <input id="filterMissionTitle" name="xyz_desc_fld" placeholder="לדוגמה: מארב / תרגיל" 
          readonly onfocus="this.removeAttribute('readonly');"
          autocomplete="one-time-code"/>
      </div>
      <div>
        <label>ימים אחורה</label>
        <select id="filterDays">
          <option value="7">7</option>
          <option value="30" selected>30</option>
          <option value="90">90</option>
          <option value="365">365</option>
          <option value="3650">הכל</option>
        </select>
      </div>
    </div>
    <div class="actions">
      <button class="primary" id="loadBtn">טען רשומות</button>
      <button id="moreBtn" class="hidden">טען עוד</button>
      <button id="exportAllBtn">📤 יצוא כלל הרשומות (JSON)</button>
    </div>
    <div class="small" id="listStatus"></div>
  </div>

  <div class="card">
    <h3>רשימה</h3>
    <div style="overflow:auto">
      <table class="tbl" id="tbl">
        <thead>
          <tr>
            <th>תאריך</th>
            <th>סוג</th>
            <th>גזרה</th>
            <th>שם</th>
            <th>תפקיד</th>
            <th>כוח</th>
            <th>ציון (0-100)</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="small">* במובייל אפשר לגלול אופקית.</div>
  </div>
</div>

<div id="modalBackdrop" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:14px;z-index:9999">
  <div class="card" style="max-width:820px;width:100%;max-height:85vh;overflow:auto">
    <div style="display:flex;gap:10px;align-items:center;justify-content:space-between">
      <h3 style="margin:0">פרטי דוח</h3>
      <div class="inlineActions">
        <button id="exportModalBtn">📱 יצוא סיכום</button>
        <button id="editModalBtn">עריכה</button>
        <button class="danger" id="deleteModalBtn">מחיקה</button>
        <button id="closeModalBtn">סגור</button>
      </div>
    </div>
    <div class="small" id="modalMeta"></div>
    <hr/>
    <div id="modalBody"></div>
  </div>
</div>

<script type="module" src="js/reports.js"></script>
<script type="module">
  // Register Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW Registered', reg))
        .catch(err => console.log('SW Registration Failed', err));
    });
  }
</script>
</body>
</html>
